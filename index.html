              <span
                id="typewriter-text"
                class="typewriter-text"
              ></span>
            </h1>
          </div>
        </section>
      </div>
    </main>
    <script>
      (function () {
        const element = document.getElementById("typewriter-text");
        if (!element) return;

        const lines = [
          "hi, my name is tareq!",
          "welcome to my website...",
          "i hope you'll enjoy the visit :)",
        ];

        const typingSpeed = 60; // ms par caractère
        const linePause = 400; // pause entre les lignes

        let lineIndex = 0;
        let charIndex = 0;

        function typeNextChar() {
          if (lineIndex >= lines.length) return;

          const currentLine = lines[lineIndex];
          const currentText =
            lines
              .slice(0, lineIndex)
              .join("\n") + (lineIndex > 0 ? "\n" : "") + currentLine.slice(0, charIndex + 1);

          element.textContent = currentText;

          charIndex++;

          if (charIndex < currentLine.length) {
            setTimeout(typeNextChar, typingSpeed);
          } else {
            lineIndex++;
            charIndex = 0;
            if (lineIndex < lines.length) {
              setTimeout(typeNextChar, linePause);
            }
          }
        }

        typeNextChar();
      })();
    </script>
